extensions:
  bearertokenauth/ingest:
    scheme: Bearer
    token: ${env:INGEST_BEARER_TOKEN}

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
        # include_metadata exposes incoming HTTP headers as request metadata
        # so processors can copy them onto spans (see attributes/boswell below).
        include_metadata: true
        auth:
          authenticator: bearertokenauth/ingest

processors:
  # Lift the gen_ai input/output message attributes that Strands instrumentation
  # records as span events onto the parent span (last-write-wins on collision).
  # The producer SDK can't do this: SpanProcessor.on_end gets a ReadableSpan
  # whose events are immutable. Other events (e.g. exception events) pass
  # through untouched and reach Honeycomb as event rows.
  transform/lift_gen_ai_event_attrs:
    error_mode: ignore
    trace_statements:
      - context: spanevent
        conditions:
          - name == "gen_ai.client.inference.operation.details"
        statements:
          - merge_maps(span.attributes, attributes, "upsert")

  # Drop the gen_ai inference-details events now that their attrs live on the
  # span. Without this they'd be duration_ms=0 noise rows in Honeycomb.
  filter/drop_lifted_gen_ai_events:
    error_mode: ignore
    traces:
      spanevent:
        - name == "gen_ai.client.inference.operation.details"

  # Boswell leaves a mark on every span he processes. Lets you reverse-lookup
  # which collector deployment, and which Lambda invocation, touched a span.
  # The X-Amzn-Trace-Id header is forwarded by LWA and is unique per Lambda
  # invocation (it's the X-Ray trace header — collector treats it as opaque).
  attributes/boswell:
    actions:
      - action: insert
        key: collector.boswell
        value: washere
      - action: insert
        key: collector.boswell.version
        value: ${env:BOSWELL_VERSION}
      - action: insert
        key: collector.boswell.invocation_trace_id
        from_context: metadata.x-amzn-trace-id

  # No batch processor: under Lambda's freeze-after-invocation lifecycle, batched
  # spans sit in memory until the next cold start (or get lost). Synchronous
  # export per request is correct here.

exporters:
  otlphttp/honeycomb:
    endpoint: ${env:HONEYCOMB_OTLP_ENDPOINT}
    headers:
      x-honeycomb-team: ${env:HONEYCOMB_API_KEY}
    # Disable async queue for the same reason: we want the OTLP POST to Honeycomb
    # to complete before this Lambda invocation returns.
    sending_queue:
      enabled: false

service:
  extensions: [bearertokenauth/ingest]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [transform/lift_gen_ai_event_attrs, filter/drop_lifted_gen_ai_events, attributes/boswell]
      exporters: [otlphttp/honeycomb]
  telemetry:
    logs:
      level: info
